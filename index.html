<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    Security Headers (NIST SP 800-53: SC-18, SI-3, SC-8, AC-3, SI-10)
    - No unsafe-inline: all JS is in external deferred scripts
    - CDN scripts locked with SRI hashes (tamper protection)
    - connect-src 'self' required for fetch() to load .md files
    - frame-ancestors 'none' blocks clickjacking
    - upgrade-insecure-requests forces HTTPS

    Note: GitHub Pages cannot set HTTP-level headers.
    For full enforcement, proxy through Cloudflare or Netlify.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://cdnjs.cloudflare.com;
                 style-src 'self';
                 img-src 'self' data: https:;
                 connect-src 'self';
                 frame-ancestors 'none';
                 form-action 'none';
                 base-uri 'self';
                 upgrade-insecure-requests;">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Permissions-Policy"
        content="camera=(), microphone=(), geolocation=(), payment=()">

  <link rel="stylesheet" href="assets/css/styles.css?v=20260317b">
  <title>Shad3ious Docs</title>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav" id="topnav" role="navigation" aria-label="Main navigation">
    <div class="nav-logo" id="nav-logo" role="button" tabindex="0" aria-label="Go to overview">
      <div class="nav-logo-icon" id="nav-logo-icon" aria-hidden="true"></div>
      <span id="nav-site-name"></span>
    </div>
    <button class="nav-search-btn" id="nav-search-btn" type="button" aria-label="Open search (Ctrl+K)">
      <span aria-hidden="true">🔍</span>
      <span>Search docs...</span>
      <kbd aria-label="Keyboard shortcut: Control K">Ctrl K</kbd>
    </button>
    <div class="nav-divider" aria-hidden="true"></div>
    <div class="nav-theme-toggle" role="group" aria-label="Color theme">
      <div class="theme-opt active" id="opt-light" role="button" tabindex="0"
           aria-pressed="true" aria-label="Switch to light mode">☀️</div>
      <div class="theme-opt" id="opt-dark" role="button" tabindex="0"
           aria-pressed="false" aria-label="Switch to dark mode">🌙</div>
    </div>
    <div class="nav-divider" aria-hidden="true"></div>
    <div class="nav-social" id="nav-social" aria-label="Social links"></div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <aside class="sidebar" id="sidebar" aria-label="Site navigation">
      <div class="sb-top">
        <div class="sb-overview-btn" id="sb-overview-btn"
             role="button" tabindex="0" aria-label="Go to overview">
          🗂️ &nbsp;Overview
        </div>
        <div class="sb-divider" aria-hidden="true"></div>
      </div>
      <div class="sb-groups" id="sb-groups" role="tree" aria-label="Documentation sections"></div>
      <div class="sb-spacer" aria-hidden="true"></div>
      <div class="sb-footer">
        <div class="sb-footer-label" aria-hidden="true">Find me on</div>
        <div class="sb-social-row" id="sb-social" aria-label="Social media links"></div>
      </div>
    </aside>

    <div class="content-wrap">
      <main class="content" id="content" role="main" aria-live="polite" aria-atomic="false">

        <!-- Overview -->
        <div class="page active" id="page-overview" aria-label="Site overview">
          <h1 class="ov-title" id="ov-title"></h1>
          <p class="ov-sub" id="ov-sub"></p>
          <div class="ov-section-label" aria-hidden="true">Browse by Category</div>
          <div class="ov-cards" id="ov-cards" role="list"></div>
        </div>

        <!-- Doc page (populated dynamically) -->
        <div class="page" id="page-doc"></div>

        <!-- Loading -->
        <div class="page" id="page-loading">
          <div class="status-wrap">
            <div class="spinner" aria-hidden="true"></div>
            <div class="status-title">Loading...</div>
          </div>
        </div>

        <!-- Error -->
        <div class="page" id="page-error">
          <div class="status-wrap">
            <div class="status-icon" aria-hidden="true">⚠️</div>
            <div class="status-title">Page not found</div>
            <p class="status-text" id="error-msg">The requested document could not be loaded.</p>
            <span class="status-back" id="error-back-btn" role="button" tabindex="0">← Back to Overview</span>
          </div>
        </div>

        <!-- Coming Soon -->
        <div class="page" id="page-wip">
          <div class="status-wrap">
            <div class="status-icon" aria-hidden="true">🚧</div>
            <div class="status-title">Coming Soon</div>
            <p class="status-text">This page hasn't been written yet. Check back later!</p>
            <span class="status-back" id="wip-back-btn" role="button" tabindex="0">← Back to Overview</span>
          </div>
        </div>

      </main>

      <!-- Right TOC -->
      <nav class="right-toc" id="right-toc" aria-label="On this page">
        <div class="rtoc-label">On this page</div>
        <div id="rtoc-items" role="list"></div>
        <div class="rtoc-divider" aria-hidden="true"></div>
        <a class="rtoc-util" id="rtoc-github" href="#"
           target="_blank" rel="noopener noreferrer" referrerpolicy="no-referrer">
          🐙 View on GitHub
        </a>
        <button class="rtoc-util rtoc-util-btn" id="rtoc-copy-btn" type="button"
                aria-label="Copy page link">
          🔗 Copy link
        </button>
      </nav>
    </div>
  </div>

  <!-- SEARCH MODAL -->
  <div class="search-overlay" id="search-overlay"
       role="dialog" aria-modal="true" aria-label="Search documentation">
    <div class="search-modal" role="document">
      <div class="search-input-wrap">
        <span aria-hidden="true">🔍</span>
        <input class="search-input" id="search-input" type="search"
               placeholder="Search docs..." autocomplete="off" spellcheck="false"
               aria-label="Search query" maxlength="100" />
        <button class="search-close" id="search-close-btn" type="button"
                aria-label="Close search">ESC</button>
      </div>
      <div class="search-results" id="search-results"
           role="listbox" aria-label="Search results"></div>
      <div class="search-footer" aria-hidden="true">
        <span>↑↓ navigate</span><span>↵ open</span><span>ESC close</span>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!--
    Vendor libraries loaded from cdnjs.cloudflare.com.
    Access is restricted to this domain only via the Content-Security-Policy above.
    crossorigin + referrerpolicy attributes prevent credential/referrer leakage.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <!--
    Cache busting: update the ?v= number any time you change config.js, app.js, or styles.css.
    The browser treats a new version string as a brand new file and always fetches it fresh.
    Easiest system: just use today's date in YYYYMMDD format.
  -->
  <script defer src="assets/js/config.js?v=20260317b"></script>
  <script defer src="assets/js/app.js?v=20260317b"></script>

</body>
</html>
